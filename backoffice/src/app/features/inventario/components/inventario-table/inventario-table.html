<div class="table-shell">
  <table class="inventario-table">
    <thead>
      <tr>
        <th>Estado</th>
        <th>Producto</th>
        <th>Categoría</th>
        <th>Precio</th>
        <th>Receta</th>
        <th>Acciones</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let item of items">
        <td>
          <div class="estado-cell">
            <span class="estado-dot" [ngClass]="getEstadoClass(item)"></span>
            <strong>{{ item.estado }}</strong>
          </div>
        </td>
        <td>
          <div class="producto-cell">
            <strong>{{ item.producto }}</strong>
            <span>{{ item.estado }}</span>
          </div>
        </td>
        <td>{{ item.categoria }}</td>
        <td class="price-cell">{{ item.precio | currency:'ARS':'symbol-narrow':'1.0-0' }}</td>
        <td class="ingredients-cell">{{ getIngredientesPreview(item) }}</td>
        <td>
          <div class="actions-cell">
            <button
              mat-icon-button
              color="primary"
              type="button"
              aria-label="Editar producto"
              matTooltip="Editar producto"
              (click)="editarProducto(item)"
            >
              <mat-icon>edit</mat-icon>
            </button>
            <button
              mat-icon-button
              color="warn"
              type="button"
              aria-label="Eliminar producto"
              matTooltip="Eliminar producto"
              (click)="eliminarProducto(item.id)"
            >
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>

  <div class="empty-state" *ngIf="items.length === 0">
    No hay productos que coincidan con los filtros.
  </div>
</div>
